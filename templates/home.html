{% extends "base.html" %}

{% block content %}
<h2>블로그 글 목록</h2>

<div class="post-list">
    {% for post in posts %}
    <div class="card">
        <h3>{{ post.title }}</h3>
        <p>{{ post.content[:50] }}...</p>
        <a href="/post/{{ post.id }}">자세히 보기</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
